  <style>
    /* ── Tokens ── */
    :root {
      --bg:               #f5f6f8;
      --surface:          #ffffff;
      --border:           #e2e5ea;
      --text-primary:     #1a1d23;
      --text-secondary:   #5a6270;
      --text-muted:       #9099a8;
      --active-bg:        #eafaf1;
      --active-border:    #27ae60;
      --active-dot:       #27ae60;
      --hold-bg:          #fff8e6;
      --hold-border:      #f39c12;
      --hold-dot:         #f39c12;
      --completed-bg:     #f0f2f5;
      --completed-border: #aab0bb;
      --completed-dot:    #aab0bb;
      --milestone-done:   #27ae60;
      --milestone-upcoming:#3b82f6;
      --milestone-overdue: #e74c3c;
      --today-tint:       #eff6ff;
      --today-accent:     #3b82f6;
      --toolbar-bg:       #ffffff;
    }

    [data-theme="dark"] {
      --bg:               #111318;
      --surface:          #1c1f26;
      --border:           #2a2e38;
      --text-primary:     #edf0f5;
      --text-secondary:   #8b95a8;
      --text-muted:       #50596a;
      --active-bg:        #0a2015;
      --active-border:    #2ecc71;
      --active-dot:       #2ecc71;
      --hold-bg:          #1f1600;
      --hold-border:      #f39c12;
      --hold-dot:         #f39c12;
      --completed-bg:     #16181f;
      --completed-border: #3a4050;
      --completed-dot:    #3a4050;
      --milestone-done:   #2ecc71;
      --milestone-upcoming:#60a5fa;
      --milestone-overdue: #f87171;
      --today-tint:       #1a2535;
      --today-accent:     #60a5fa;
      --toolbar-bg:       #1c1f26;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-left { display: flex; align-items: baseline; gap: 14px; }
    .logo-text { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .logo-sub  { font-size: 15px; font-weight: 500; color: var(--text-secondary); }

    .header-right { text-align: right; }
    #clock { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; }
    #date-display { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 40px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      position: sticky;
      top: 72px;
      z-index: 19;
    }

    .pill-group {
      display: flex;
      gap: 3px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
    }

    .pill-btn {
      padding: 7px 16px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill-btn:hover { color: var(--text-primary); }

    .pill-btn.active {
      background: var(--surface);
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .toolbar-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .sort-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
    }

    #sort-controls { display: flex; align-items: center; gap: 8px; }

    .theme-btn {
      margin-left: auto;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .theme-btn:hover { background: var(--bg); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 12px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .stat-chip .dot { width: 9px; height: 9px; border-radius: 50%; }
    .stat-chip .count { font-size: 19px; font-weight: 800; color: var(--text-primary); }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 22px;
      padding: 28px 40px;
    }

    /* ── Program Card ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-title  { font-size: 18px; font-weight: 700; line-height: 1.3; }

    .status-badge {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      border: 1.5px solid transparent;
    }

    .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; }

    .status-badge.active    { background:var(--active-bg);    border-color:var(--active-border);    color:var(--active-border);    }
    .status-badge.active .dot { background:var(--active-dot); animation: pulse 2s infinite; }
    .status-badge.on-hold   { background:var(--hold-bg);      border-color:var(--hold-border);      color:var(--hold-border);      }
    .status-badge.on-hold .dot { background:var(--hold-dot); }
    .status-badge.completed { background:var(--completed-bg); border-color:var(--completed-border); color:var(--completed-border); }
    .status-badge.completed .dot { background:var(--completed-dot); }

    .card-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
    .meta-item { display: flex; align-items: center; gap: 5px; }
    .lead-tag  { display:inline-flex; align-items:center; gap:5px; background:var(--bg); border-radius:7px; padding:3px 9px; font-size:11px; font-weight:600; color:var(--text-secondary); }

    .progress-row { display: flex; flex-direction: column; gap: 5px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--text-muted); }
    .progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #6366f1); }
    .progress-fill.complete { background: linear-gradient(90deg, #27ae60, #16a085); }

    .milestones-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-bottom: 6px; }

    .milestone { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .milestone-icon { width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
    .milestone-icon.done     { background: var(--milestone-done);     color: white; }
    .milestone-icon.upcoming { background: #dbeafe; color: var(--milestone-upcoming); border: 1.5px solid var(--milestone-upcoming); }
    .milestone-icon.overdue  { background: #fde8e8; color: var(--milestone-overdue);  border: 1.5px solid var(--milestone-overdue); }

    [data-theme="dark"] .milestone-icon.upcoming { background: #1e3a5f; }
    [data-theme="dark"] .milestone-icon.overdue  { background: #3b1515; }

    .milestone-name           { flex: 1; color: var(--text-primary); }
    .milestone-name.done      { color: var(--text-muted); text-decoration: line-through; }
    .milestone-date           { font-size: 11px; color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .milestone-date.overdue   { color: var(--milestone-overdue); font-weight: 700; }

    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 18px; }

    /* ── Monthly Calendar ── */
    .cal-container { padding: 24px 40px 32px; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    .cal-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-primary);
      font-weight: 700;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: var(--bg); }

    .cal-month-label {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      min-width: 210px;
      text-align: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .cal-header-cell {
      background: var(--surface);
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
    }

    .cal-cell {
      background: var(--surface);
      min-height: 110px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .cal-cell.outside  { background: var(--bg); opacity: .5; }
    .cal-cell.today    { background: var(--today-tint); }

    .cal-strips { display: flex; gap: 2px; height: 5px; margin-bottom: 3px; }
    .cal-strip  { flex: 1; height: 5px; border-radius: 3px; }

    .cal-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }
    .cal-cell.today .cal-date { color: var(--today-accent); }
    .cal-today-badge {
      display: inline-block;
      background: var(--today-accent);
      color: white;
      border-radius: 99px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 4px;
    }

    .cal-milestone-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 5px;
      overflow: hidden;
      border-left: 3px solid transparent;
      line-height: 1.3;
    }

    .cal-milestone-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .cal-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── 2-Week View ── */
    .twoweek-container { padding: 24px 40px 32px; overflow-x: auto; }

    .twoweek-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    .twoweek-range-label {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      min-width: 280px;
      text-align: center;
    }

    .twoweek-wrap { overflow-x: auto; }

    .twoweek-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .twoweek-table thead tr {
      border-bottom: 2px solid var(--border);
    }

    .twoweek-th-prog {
      text-align: left;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      min-width: 200px;
      width: 200px;
    }

    .twoweek-th-day {
      text-align: center;
      padding: 6px 2px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      width: 7%;
    }

    .twoweek-th-day.is-today { color: var(--today-accent); }
    .twoweek-th-day.is-weekend { opacity: .55; }

    .twoweek-th-day .tw-day-num {
      display: block;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }

    .twoweek-th-day.is-today .tw-day-num { color: var(--today-accent); }

    .twoweek-row td { border-bottom: 1px solid var(--border); }

    .twoweek-prog-cell {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      border-right: 2px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
    }

    .twoweek-prog-status {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 2px;
    }

    .twoweek-day-cell {
      padding: 6px 3px;
      text-align: center;
      vertical-align: middle;
      position: relative;
      min-height: 56px;
    }

    .twoweek-day-cell.is-today { background: rgba(59,130,246,.05); }
    .twoweek-day-cell.is-weekend { background: var(--bg); opacity: .7; }
    .twoweek-day-cell.is-active { /* program is running this day */ }

    .twoweek-bar-bg {
      position: absolute;
      top: 8px; bottom: 8px;
      left: 0; right: 0;
      border-radius: 3px;
      opacity: .12;
      pointer-events: none;
    }

    .twoweek-milestone-bubble {
      position: relative;
      z-index: 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      max-width: 100%;
    }

    .tw-bubble-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
      flex-shrink: 0;
    }

    .tw-bubble-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-primary);
      max-width: 80px;
      text-align: center;
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .twoweek-empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ── Footer ── */
    .refresh-bar { text-align: center; padding: 14px; font-size: 11px; color: var(--text-muted); }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo-text">What's Going On</span>
    <span class="logo-sub">GFN Programs Dashboard</span>
  </div>
  <div class="header-right">
    <div id="clock">--:--</div>
    <div id="date-display">Loading…</div>
  </div>
</header>

<div class="toolbar">
  <!-- View switcher -->
  <div class="pill-group" id="view-tabs">
    <button class="pill-btn active" data-view="cards">Cards</button>
    <button class="pill-btn" data-view="monthly">Monthly</button>
    <button class="pill-btn" data-view="twoweek">2-Week</button>
  </div>

  <!-- Sort controls (cards only) -->
  <div id="sort-controls">
    <div class="toolbar-sep"></div>
    <span class="sort-label">Sort</span>
    <div class="pill-group" id="sort-btns">
      <button class="pill-btn active" data-sort="status">Status</button>
      <button class="pill-btn" data-sort="name">Name</button>
      <button class="pill-btn" data-sort="progress">Progress</button>
      <button class="pill-btn" data-sort="start">Start</button>
      <button class="pill-btn" data-sort="end">End</button>
    </div>
  </div>

  <button class="theme-btn" id="theme-toggle">🌙 Dark</button>
</div>

<div class="stats-bar" id="stats-bar"></div>
<div id="main-content"></div>
<div class="refresh-bar" id="refresh-bar">Auto-refreshes every 5 minutes</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────
  const PROG_COLORS = [
    '#3b82f6','#8b5cf6','#06b6d4','#f59e0b',
    '#10b981','#6366f1','#94a3b8','#64748b','#78716c'
  ];

  const STATUS_LABELS = { active:'Active', 'on-hold':'On Hold', completed:'Completed' };
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  // ── State ─────────────────────────────────────────────────────────────
  let currentView = 'cards';
  let currentSort = 'status';
  let calYear, calMonth, twOffset = 0;
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();

  // Dark mode — persisted
  const savedTheme = localStorage.getItem('gfn-theme') || 'light';
  applyTheme(savedTheme);

  // ── Helpers ───────────────────────────────────────────────────────────
  function color(idx) { return PROG_COLORS[idx % PROG_COLORS.length]; }

  function colorFor(prog) {
    return color(window.PROGRAMS.findIndex(p => p.id === prog.id));
  }

  function fmt(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function fmtShort(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  function daysLeft(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end   = new Date(dateStr + 'T00:00:00');
    return Math.round((end - today) / 86400000);
  }

  function toDate(str) {
    if (!str) return null;
    return new Date(str + 'T00:00:00');
  }

  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function programProgress(p) {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = toDate(p.startDate);
    const end   = toDate(p.endDate);
    if (!start || !end) return 0;
    if (today <= start) return 0;
    if (today >= end)   return 100;
    return Math.round(((today - start) / (end - start)) * 100);
  }

  function milestoneState(m) {
    if (m.completed) return 'done';
    return daysLeft(m.date) < 0 ? 'overdue' : 'upcoming';
  }

  function getSorted() {
    const order = { active:0, 'on-hold':1, completed:2 };
    const arr = [...window.PROGRAMS];
    switch (currentSort) {
      case 'name':     return arr.sort((a,b) => a.name.localeCompare(b.name));
      case 'progress': return arr.sort((a,b) => programProgress(b) - programProgress(a));
      case 'start':    return arr.sort((a,b) => (a.startDate||'').localeCompare(b.startDate||''));
      case 'end':      return arr.sort((a,b) => (a.endDate||'').localeCompare(b.endDate||''));
      default:         return arr.sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
    }
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀ Light' : '🌙 Dark';
    localStorage.setItem('gfn-theme', theme);
  }

  // ── Stats ─────────────────────────────────────────────────────────────
  function renderStats() {
    const counts = { active:0, 'on-hold':0, completed:0 };
    window.PROGRAMS.forEach(p => counts[p.status] = (counts[p.status]||0) + 1);
    document.getElementById('stats-bar').innerHTML =
      [{ key:'active',    label:'Active',    c:'#27ae60' },
       { key:'on-hold',   label:'On Hold',   c:'#f39c12' },
       { key:'completed', label:'Completed', c:'#aab0bb' }]
      .map(({ key, label, c }) => `
        <div class="stat-chip">
          <div class="dot" style="background:${c}"></div>
          <span class="count">${counts[key]||0}</span>
          <span>${label}</span>
        </div>`)
      .join('<div style="flex:1"></div>') +
      `<div class="stat-chip" style="margin-left:auto">
         <span style="font-size:12px;color:var(--text-muted)">${window.PROGRAMS.length} programs total</span>
       </div>`;
  }

  // ── Cards View ────────────────────────────────────────────────────────
  function renderCard(p) {
    const progress = programProgress(p);
    const dl       = daysLeft(p.endDate);
    const isComp   = p.status === 'completed';
    const c        = colorFor(p);

    const daysLabel = isComp    ? 'Ended' :
                      dl < 0    ? `Ended ${Math.abs(dl)}d ago` :
                      dl === 0  ? 'Ends today' : `${dl}d remaining`;

    const milestones = (p.milestones || []).slice(0, 4);

    return `
      <div class="card" style="border-top: 3px solid ${c}">
        <div class="card-header">
          <div class="card-title">${p.name}</div>
          <div class="status-badge ${p.status}">
            <div class="dot"></div>${STATUS_LABELS[p.status]||p.status}
          </div>
        </div>

        <div class="card-meta">
          <div class="meta-item">📅 ${fmt(p.startDate)} – ${fmt(p.endDate)}</div>
          ${p.lead ? `<div class="meta-item"><span class="lead-tag">👤 ${p.lead}</span></div>` : ''}
          <div class="meta-item" style="margin-left:auto;font-weight:700;color:${dl < 7 && !isComp ? 'var(--milestone-overdue)' : 'var(--text-muted)'}">
            ${daysLabel}
          </div>
        </div>

        <div class="progress-row">
          <div class="progress-label"><span>Timeline Progress</span><span>${progress}%</span></div>
          <div class="progress-track">
            <div class="progress-fill ${progress >= 100 ? 'complete' : ''}" style="width:${progress}%"></div>
          </div>
        </div>

        ${milestones.length ? `
        <div>
          <div class="milestones-label">Milestones</div>
          ${milestones.map(m => {
            const state = milestoneState(m);
            const icon  = state === 'done' ? '✓' : state === 'overdue' ? '!' : '○';
            return `<div class="milestone">
              <div class="milestone-icon ${state}">${icon}</div>
              <span class="milestone-name ${state}">${m.name}</span>
              <span class="milestone-date ${state === 'overdue' ? 'overdue' : ''}">${fmt(m.date)}</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
  }

  function renderCards() {
    const sorted = getSorted();
    return `<div class="grid">${
      sorted.length ? sorted.map(renderCard).join('') : '<div class="empty">No programs found.</div>'
    }</div>`;
  }

  // ── Monthly Calendar View ─────────────────────────────────────────────
  function renderMonthly() {
    const firstDay  = new Date(calYear, calMonth, 1);
    const lastDay   = new Date(calYear, calMonth + 1, 0);
    const startDow  = firstDay.getDay();
    const totalDays = lastDay.getDate();
    const todayKey  = dateKey(new Date());

    // Build milestone map: day → [{prog, milestone, color}]
    const msByDay = {};
    window.PROGRAMS.forEach((prog, idx) => {
      (prog.milestones || []).forEach(m => {
        if (!m.date) return;
        const d = new Date(m.date + 'T12:00:00');
        if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
          const k = d.getDate();
          if (!msByDay[k]) msByDay[k] = [];
          msByDay[k].push({ prog, m, c: color(idx) });
        }
      });
    });

    // Active programs each day (for strip bars)
    function activeStrips(dayNum) {
      const d = new Date(calYear, calMonth, dayNum);
      const dk = dateKey(d);
      return window.PROGRAMS.map((prog, idx) => ({
        prog, c: color(idx),
        active: prog.startDate && prog.endDate && dk >= prog.startDate && dk <= prog.endDate
      })).filter(x => x.active);
    }

    // Build grid cells
    let cells = '';

    // Leading empty cells
    for (let i = 0; i < startDow; i++) {
      cells += `<div class="cal-cell outside"></div>`;
    }

    // Day cells
    for (let day = 1; day <= totalDays; day++) {
      const dStr   = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isToday = dStr === todayKey;
      const strips  = activeStrips(day);
      const ms      = msByDay[day] || [];

      cells += `<div class="cal-cell ${isToday ? 'today' : ''}">
        <div class="cal-strips">
          ${strips.slice(0, 6).map(s => `<div class="cal-strip" style="background:${s.c}"></div>`).join('')}
        </div>
        <div class="cal-date">${day}${isToday ? '<span class="cal-today-badge">Today</span>' : ''}</div>
        ${ms.slice(0, 4).map(({ m, c: mc }) =>
          `<div class="cal-milestone-pill" style="border-left-color:${mc}">
            <span class="cal-milestone-name">${m.name}</span>
          </div>`
        ).join('')}
        ${ms.length > 4 ? `<div class="cal-milestone-pill" style="color:var(--text-muted)">+${ms.length - 4} more</div>` : ''}
      </div>`;
    }

    // Trailing empty cells to complete the last row
    const totalCells = startDow + totalDays;
    const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 0; i < trailing; i++) {
      cells += `<div class="cal-cell outside"></div>`;
    }

    // Legend
    const legend = window.PROGRAMS.map((prog, idx) =>
      `<div class="cal-legend-item">
        <div class="cal-legend-dot" style="background:${color(idx)}"></div>
        <span>${prog.name}</span>
      </div>`
    ).join('');

    return `<div class="cal-container">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">&#8592;</button>
        <div class="cal-month-label">${MONTHS[calMonth]} ${calYear}</div>
        <button class="cal-nav-btn" id="cal-next">&#8594;</button>
      </div>
      <div class="cal-grid">
        ${DAYS.map(d => `<div class="cal-header-cell">${d}</div>`).join('')}
        ${cells}
      </div>
      <div class="cal-legend">${legend}</div>
    </div>`;
  }

  // ── 2-Week View ───────────────────────────────────────────────────────
  function renderTwoWeek() {
    const start = new Date(); start.setHours(0,0,0,0);
    start.setDate(start.getDate() + twOffset * 14);
    const days = Array.from({ length: 14 }, (_, i) => {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      return d;
    });

    const todayKey = dateKey(new Date());
    const rangeStart = dateKey(days[0]);
    const rangeEnd   = dateKey(days[13]);

    // Filter programs that have any overlap with this 14-day window
    const visible = window.PROGRAMS.filter(p => {
      const hasOverlap = p.startDate && p.endDate &&
        p.startDate <= rangeEnd && p.endDate >= rangeStart;
      const hasMilestone = (p.milestones||[]).some(m => m.date >= rangeStart && m.date <= rangeEnd);
      return hasOverlap || hasMilestone;
    });

    if (!visible.length) {
      return `<div class="twoweek-container">
        ${twoweekNav(days)}
        <div class="twoweek-empty">No programs active during this period.</div>
      </div>`;
    }

    // Column headers
    const headers = days.map(d => {
      const dk      = dateKey(d);
      const isToday = dk === todayKey;
      const isWknd  = d.getDay() === 0 || d.getDay() === 6;
      return `<th class="twoweek-th-day ${isToday ? 'is-today' : ''} ${isWknd ? 'is-weekend' : ''}">
        <span class="tw-day-num">${d.getDate()}</span>
        ${DAYS[d.getDay()]}
      </th>`;
    }).join('');

    // Rows
    const rows = visible.map(prog => {
      const progColor = colorFor(prog);
      const msMap = {};
      (prog.milestones||[]).forEach(m => { msMap[m.date] = m; });

      const cells = days.map(d => {
        const dk     = dateKey(d);
        const isToday = dk === todayKey;
        const isWknd  = d.getDay() === 0 || d.getDay() === 6;
        const active  = prog.startDate && prog.endDate && dk >= prog.startDate && dk <= prog.endDate;
        const ms      = msMap[dk];

        return `<td class="twoweek-day-cell ${isToday ? 'is-today' : ''} ${isWknd ? 'is-weekend' : ''}">
          ${active ? `<div class="twoweek-bar-bg" style="background:${progColor}"></div>` : ''}
          ${ms ? `<div class="twoweek-milestone-bubble">
            <div class="tw-bubble-dot" style="background:${
              ms.completed ? 'var(--milestone-done)' :
              daysLeft(ms.date) < 0 ? 'var(--milestone-overdue)' : progColor
            }"></div>
            <div class="tw-bubble-label">${ms.name}</div>
          </div>` : ''}
        </td>`;
      }).join('');

      const statusColor = prog.status === 'active' ? 'var(--active-border)' :
                          prog.status === 'on-hold' ? 'var(--hold-border)' : 'var(--text-muted)';

      return `<tr class="twoweek-row">
        <td class="twoweek-prog-cell" style="border-left: 3px solid ${progColor}">
          ${prog.name}
          <span class="twoweek-prog-status" style="color:${statusColor}">${STATUS_LABELS[prog.status]||prog.status}</span>
        </td>
        ${cells}
      </tr>`;
    }).join('');

    return `<div class="twoweek-container">
      ${twoweekNav(days)}
      <div class="twoweek-wrap">
        <table class="twoweek-table">
          <thead>
            <tr>
              <th class="twoweek-th-prog">Program</th>
              ${headers}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  function twoweekNav(days) {
    return `<div class="twoweek-nav">
      <button class="cal-nav-btn" id="tw-prev">&#8592;</button>
      <div class="twoweek-range-label">${fmtShort(dateKey(days[0]))} – ${fmtShort(dateKey(days[13]))}, ${days[0].getFullYear()}</div>
      <button class="cal-nav-btn" id="tw-next">&#8594;</button>
    </div>`;
  }

  // ── Main render ───────────────────────────────────────────────────────
  function render() {
    renderStats();
    const content = document.getElementById('main-content');

    if (currentView === 'cards') {
      content.innerHTML = renderCards();
    } else if (currentView === 'monthly') {
      content.innerHTML = renderMonthly();
      document.getElementById('cal-prev').onclick = () => {
        calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
        render();
      };
      document.getElementById('cal-next').onclick = () => {
        calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
        render();
      };
    } else {
      content.innerHTML = renderTwoWeek();
      document.getElementById('tw-prev').onclick = () => { twOffset--; render(); };
      document.getElementById('tw-next').onclick = () => { twOffset++; render(); };
    }

    document.getElementById('refresh-bar').textContent =
      `Last updated: ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} · Auto-refreshes every 5 minutes`;
  }

  // ── Clock ─────────────────────────────────────────────────────────────
  function updateClock() {
    const n = new Date();
    document.getElementById('clock').textContent =
      n.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
    document.getElementById('date-display').textContent =
      n.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Event wiring ──────────────────────────────────────────────────────
  document.getElementById('view-tabs').addEventListener('click', e => {
    const btn = e.target.closest('[data-view]');
    if (!btn) return;
    currentView = btn.dataset.view;
    document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('sort-controls').style.display = currentView === 'cards' ? 'flex' : 'none';
    render();
  });

  document.getElementById('sort-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-sort]');
    if (!btn) return;
    currentSort = btn.dataset.sort;
    document.querySelectorAll('[data-sort]').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  // ── Boot & auto-refresh ───────────────────────────────────────────────
  render();
  setInterval(() => location.reload(), 5 * 60 * 1000);
</script>
</body>
</html>
